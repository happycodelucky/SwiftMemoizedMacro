name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and test
        run: swift test

      - name: Determine next version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get latest release tag, default to 0.0.0 if none exists
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')
          if [ -z "$LATEST" ]; then
            LATEST="0.0.0"
          else
            # Strip leading 'v' if present
            LATEST="${LATEST#v}"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"

          case "${{ inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${LATEST} → ${NEW_VERSION} (${{ inputs.bump }})"

      - name: Update README version
        run: |
          sed -i '' 's/from: "[0-9]*\.[0-9]*\.[0-9]*"/from: "${{ steps.version.outputs.version }}"/' README.md

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update README version to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          gh release create "${{ steps.version.outputs.tag }}" \
            --target "$COMMIT_SHA" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
